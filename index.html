<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>What's That Color?</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <header>
    <h1 id="title">What's That Color?</h1>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-label"></span>
        <span class="stat-value" id="stat-streak">0</span>
      </div>
      <div class="stat">
        <span class="stat-label"></span>
        <span class="stat-value" id="stat-best">—</span>
      </div>
    </div>
  </header>

  <main>
    <section class="game-area">
      <div id="swatch" class="swatch" aria-label="Color swatch to identify"></div>

      <div id="reveal-bar" class="reveal-bar">
        <div class="reveal-bar-fill"></div>
      </div>

      <div id="choices" class="choices" role="group" aria-label="Color name choices">
        <button class="choice-btn" data-index="0"></button>
        <button class="choice-btn" data-index="1"></button>
        <button class="choice-btn" data-index="2"></button>
      </div>

      <button id="next-btn" class="next-btn hidden"></button>

      <div id="info-panel" class="info-panel hidden" aria-live="polite">
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Name</span>
            <span id="info-name" class="info-value"></span>
          </div>
          <div class="info-item">
            <span class="info-label">Hex</span>
            <span id="info-hex" class="info-value mono"></span>
          </div>
          <div class="info-item">
            <span class="info-label">RGB</span>
            <span id="info-rgb" class="info-value mono"></span>
          </div>
        </div>
      </div>

      <div id="similar-panel" class="similar-panel hidden">
        <div class="similar-cell similar-left">
          <div class="similar-swatch" id="sim-left-swatch"></div>
          <span class="similar-name" id="sim-left-name"></span>
        </div>
        <div class="similar-cell similar-center">
          <div class="similar-swatch" id="sim-center-swatch"></div>
          <span class="similar-name" id="sim-center-name"></span>
        </div>
        <div class="similar-cell similar-right">
          <div class="similar-swatch" id="sim-right-swatch"></div>
          <span class="similar-name" id="sim-right-name"></span>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div id="lang-switcher">
      <select id="lang-select"></select>
    </div>
    <div id="colorset-switcher">
      <select id="colorset-select"></select>
    </div>
    <a href="https://github.com/BastiTee/name-that-color" target="_blank" rel="noopener" class="source-link" aria-label="Source Code on GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </footer>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
